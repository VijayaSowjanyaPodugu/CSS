<!DOCTYPE html>
<html>

<head>
    <title>Id Selector</title>
       <script  defer>
        debugger;
        
        document.body.style.backgroundColor = "blue";


        function buttononclick() {
            debugger;
            document.getElementById("h1idselector").style.backgroundColor = "gray";
            document.getElementById("h1idselector").style.border = "2px solid black";
            document.getElementById("pidselector").style.backgroundColor = "green";
            document.getElementById("pidselector").style.border = "2px solid yellow";
            document.getElementById("buttonclickon").style.backgroundColor = "blue";
            document.getElementById("buttonclickon").style.border = "2px solid red";

        }

        function changeBackgroundColor(color) {
            document.body.style.backgroundColor = color;
        }




    </script>

</head>

<body>
    <div>
        <h1 id="h1idselector">Id Selector</h1>
        <p id="pidselector">This is a paragraph with an ID selector.</p>
    </div>
    <button id="buttonclickon" onclick="buttononclick()">onclick change colour</button>


    <div>
        <h1> ChangeBackground Color </h1>
        <button style="background-color: rgb(221, 19, 19); border: 2px solid black;"
            onclick="changeBackgroundColor('red')">red</button>
        <button style="background-color: rgb(228, 214, 18); border: 2px solid black;"
            onclick="changeBackgroundColor('yellow')">yellow</button>
        <button style="background-color: rgb(19, 214, 107); border: 2px solid black;"
            onclick="changeBackgroundColor('green')">green</button>
        <button style="background-color:cyan; border:2px,soild,black;" onclick="changeBackgroundColor('cyan')">sky
            blue</button>
        <button style="background-color: rgb(225, 120, 178); border: 2px solid black;"
            onclick="changeBackgroundColor('pink')">pink</button>

    </div>
</body>

</html>
