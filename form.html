<!DOCTYPE html>
<html>

<head>
    <title>form</title>
    <link rel="stylesheet" href="formstyle.css">
</head>

<body>
    <div>
       

        <form>
             <h1 class="formcss">Form</h1>
            <label class="namecss" style="text-align: center;"> Name</label>
            <input type="text" placeholder="Enter your Name" id="textname"><br>

            <label class="numbercss"> Phone number</label>
            <input type="number" placeholder="Enter your Number" id="number"><br>

            <label class="emailcss">Email id</label>
            <input type="text" placeholder="Enter your email id" id="email"><br>

            <label class="gendercss">Gender</label>
            <input type="radio">Male
            <input type="radio">Female<br>

            <label class="branchcss">Branch</label>
            <select>
                <option>Select</option>
                <option>ECE</option>
                <option>CSE</option>
                <option>EEE</option>
                <option>IOT</option>
            </select><br>

            <label class="skillcss">Skills</label>
            <input type="checkbox">HTML
            <input type="checkbox">CSS
            <input type="checkbox">Javascript
            <input type="checkbox">Devops<br>
            
            <button>Submit</button><br>
        </form>
    </div>

</body>

</html>
