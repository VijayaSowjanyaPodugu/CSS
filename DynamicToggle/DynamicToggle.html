<!DOCTYPE html>
<html>
    <head>
        <title>Toggle</title>
        <style>
            .hide{
                display:none
            }
        </style>
        <script>
            function onClickToggle(){
                document.getElementById("menu").classList.toggle("hide");
            }
        </script>
    </head>
    <body>
       <div id="menu">
        Home
        About
        Contact
       </div>
       <button id="btnToggle" onclick="onClickToggle()">Toggle</button> 
    </body>
</html>
