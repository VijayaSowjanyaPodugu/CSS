<!DOCTYPE html>
<html>

<head>
    <title>Selectors</title>
    <style>
        /*class*/
        .red{ 
            text-align: justify;
            color: darkgoldenrod;
        }
        /*identification*/
        #class {
            text-align: right;
            color: rgb(229, 99, 99);
        }

        /* Universal Selector*/
        * {
            text-align: center;
            color: chocolate;
        }

        /* grouping selectors*/
        h1,h2,h3,h4 {
            text-align: start;
            color: blueviolet
        }
    </style>
</head>

<body>
    <h2>good</h2>
    <h1>Hello! welcome to our institue</h1>
    <h3 class="red">I like red colour</h3>
    <h4 id="class">selector</h4>
</body>

</html>
